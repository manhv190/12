<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp kỷ niệm</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* dòng hướng dẫn chạm */

#tapStart{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:18px;
color:white;
opacity:0.85;
letter-spacing:1px;
animation:blink 1.5s infinite;
z-index:999;
}

@keyframes blink{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* kim tuyến */

.sparkle{
position:fixed;
top:-10px;
width:3px;
height:3px;
background:white;
border-radius:50%;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* khu vực ảnh */

.section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

/* card animation */

.card{
margin-bottom:35px;
opacity:0;
transform:translateY(80px);
transition:1s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* lời kết */

.end{
text-align:center;
margin-top:80px;
font-size:22px;
opacity:0.9;
}

/* khung lời chúc */

.wish-box{
margin-top:40px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
backdrop-filter:blur(10px);
}

.wish-box input,
.wish-box textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

.wish-box textarea{
height:90px;
resize:none;
}

.wish-box button{
margin-top:10px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.wish-item{
margin-top:15px;
background:rgba(255,255,255,0.12);
padding:12px;
border-radius:12px;
}

.wish-name{
font-weight:bold;
color:#93c5fd;
margin-bottom:5px;
}

</style>
</head>

<body>

<div id="tapStart">👆 Chạm vào màn hình để bắt đầu</div>

<audio id="music" loop>
<source src="thiep.MP3" type="audio/mpeg">
</audio>

<div class="section">

<div class="card"><img src="1.gif"></div>
<div class="card"><img src="2.gif"></div>
<div class="card"><img src="3.gif"></div>
<div class="card"><img src="4.gif"></div>
<div class="card"><img src="5.gif"></div>
<div class="card"><img src="6.gif"></div>
<div class="card"><img src="7.gif"></div>
<div class="card"><img src="8.gif"></div>
<div class="card"><img src="9.gif"></div>

<div class="end">
Cảm ơn mọi người đã đồng hành cùng hành trình này ✨
</div>

<div class="wish-box">

<h3>💌 Gửi lời chúc của bạn</h3>

<input id="name" placeholder="Tên của bạn">

<textarea id="wish" placeholder="Viết lời chúc của bạn..."></textarea>

<button onclick="addWish()">Gửi lời chúc</button>

<div id="wishList"></div>

</div>

</div>

<script>

/* audio */

let music=document.getElementById("music")

function startMusic(){

music.play().catch(()=>{})

/* ẩn dòng hướng dẫn */

let tap=document.getElementById("tapStart")
if(tap) tap.style.display="none"

}

document.addEventListener("click",startMusic,{once:true})
document.addEventListener("touchstart",startMusic,{once:true})
document.addEventListener("scroll",startMusic,{once:true})

/* scroll animation */

const cards=document.querySelectorAll(".card")

window.addEventListener("scroll",()=>{

cards.forEach(card=>{

let top=card.getBoundingClientRect().top

if(top < window.innerHeight - 120){
card.classList.add("show")
}

})

})

/* kim tuyến */

for(let i=0;i<80;i++){

let sparkle=document.createElement("div")

sparkle.className="sparkle"

sparkle.style.left=Math.random()*100+"%"
sparkle.style.opacity=Math.random()
sparkle.style.animationDuration=(Math.random()*6+4)+"s"

document.body.appendChild(sparkle)

}

/* load lời chúc */

let wishList=document.getElementById("wishList")

let saved=JSON.parse(localStorage.getItem("wishes") || "[]")

saved.forEach(w=>{
createWish(w.name,w.text)
})

/* gửi lời chúc */

function addWish(){

let name=document.getElementById("name").value
let wish=document.getElementById("wish").value

if(name==""||wish=="") return

createWish(name,wish)

saved.push({name:name,text:wish})

localStorage.setItem("wishes",JSON.stringify(saved))

document.getElementById("name").value=""
document.getElementById("wish").value=""

}

function createWish(name,text){

let box=document.createElement("div")

box.className="wish-item"

box.innerHTML="<div class='wish-name'>"+name+"</div>"+text

wishList.appendChild(box)

}

</script>

</body>
</html>
