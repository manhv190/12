<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp kỷ niệm</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* tuyết */

.snow{
position:fixed;
top:-10px;
color:white;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* khu vực ảnh */

.section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
margin-bottom:25px;
opacity:0;
transform:translateY(60px);
transition:1s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.end{
text-align:center;
margin-top:80px;
font-size:22px;
opacity:0.9;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="thiep.mp3" type="audio/mpeg">
</audio>

<div class="section">

<div class="card"><img src="1.gif"></div>
<div class="card"><img src="2.gif"></div>
<div class="card"><img src="3.gif"></div>
<div class="card"><img src="4.gif"></div>
<div class="card"><img src="5.gif"></div>
<div class="card"><img src="6.gif"></div>
<div class="card"><img src="7.gif"></div>
<div class="card"><img src="8.gif"></div>
<div class="card"><img src="9.gif"></div>

<div class="end">
Cảm ơn mọi người đã đồng hành cùng hành trình này ✨
</div>

</div>

<script>

/* bật nhạc khi chạm màn hình */

let music=document.getElementById("music")

function startMusic(){
music.play().catch(()=>{})
}

document.addEventListener("click",startMusic,{once:true})
document.addEventListener("touchstart",startMusic,{once:true})

/* hiệu ứng ảnh khi cuộn */

const cards=document.querySelectorAll(".card")

window.addEventListener("scroll",()=>{

cards.forEach(card=>{

let top=card.getBoundingClientRect().top

if(top<window.innerHeight-100){
card.classList.add("show")
}

})

})

/* tuyết */

for(let i=0;i<60;i++){

let snow=document.createElement("div")

snow.className="snow"

snow.innerHTML="❄"

snow.style.left=Math.random()*100+"%"
snow.style.animationDuration=(Math.random()*5+5)+"s"
snow.style.opacity=Math.random()
snow.style.fontSize=(Math.random()*10+10)+"px"

document.body.appendChild(snow)

}

</script>

</body>
</html>
