<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp kỷ niệm</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* tuyết */

.snow{
position:fixed;
top:-10px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* khu vực ảnh */

.section{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
margin-bottom:25px;
}

.card img{
width:100%;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* lời kết */

.end{
text-align:center;
margin-top:80px;
font-size:22px;
opacity:0.9;
}

/* khung lời chúc */

.wish-box{
margin-top:40px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
backdrop-filter:blur(10px);
}

.wish-box input,
.wish-box textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

.wish-box textarea{
height:90px;
resize:none;
}

.wish-box button{
margin-top:10px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.wish-item{
margin-top:15px;
background:rgba(255,255,255,0.12);
padding:12px;
border-radius:12px;
}

.wish-name{
font-weight:bold;
color:#93c5fd;
margin-bottom:5px;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="thiep.MP3" type="audio/mpeg">
</audio>

<div class="section">

<div class="card"><img src="1.gif"></div>
<div class="card"><img src="2.gif"></div>
<div class="card"><img src="3.gif"></div>
<div class="card"><img src="4.gif"></div>
<div class="card"><img src="5.gif"></div>
<div class="card"><img src="6.gif"></div>
<div class="card"><img src="7.gif"></div>
<div class="card"><img src="8.gif"></div>
<div class="card"><img src="9.gif"></div>

<div class="end">
Cảm ơn mọi người đã đồng hành cùng hành trình này ✨
</div>

<div class="wish-box">

<h3>💌 Gửi lời chúc của bạn</h3>

<input id="name" placeholder="Tên của bạn">

<textarea id="wish" placeholder="Viết lời chúc của bạn..."></textarea>

<button onclick="addWish()">Gửi lời chúc</button>

<div id="wishList"></div>

</div>

</div>

<script>

/* bật nhạc khi chạm */

document.addEventListener("click",()=>{
music.play().catch(()=>{})
},{once:true})

document.addEventListener("touchstart",()=>{
music.play().catch(()=>{})
},{once:true})

function startMusic(){
music.play().catch(()=>{})
window.removeEventListener("scroll",startMusic)
}

window.addEventListener("scroll",startMusic)

/* tuyết */

for(let i=0;i<50;i++){

let snow=document.createElement("div")

snow.className="snow"
snow.innerHTML="❄"

snow.style.left=Math.random()*100+"%"
snow.style.fontSize=(Math.random()*12+10)+"px"
snow.style.opacity=Math.random()
snow.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(snow)

}

/* gửi lời chúc */

function addWish(){

let name=document.getElementById("name").value
let wish=document.getElementById("wish").value

if(name==""||wish=="") return

let box=document.createElement("div")

box.className="wish-item"

box.innerHTML="<div class='wish-name'>"+name+"</div>"+wish

document.getElementById("wishList").appendChild(box)

document.getElementById("name").value=""
document.getElementById("wish").value=""

}

</script>

</body>
</html>
