<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:black;
overflow:hidden;

}

/* ảnh cover */

.cover{

width:90%;
max-width:750px;

margin-bottom:40px;

z-index:2;

}

/* nút open */

.open-btn{

padding:16px 50px;

font-size:20px;

border-radius:50px;

border:1px solid rgba(255,255,255,0.6);

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

color:white;

cursor:pointer;

letter-spacing:2px;

box-shadow:
0 0 10px rgba(255,255,255,0.6),
0 0 30px rgba(120,180,255,0.8);

animation:glow 2s infinite;

z-index:2;

}

@keyframes glow{

0%{
box-shadow:
0 0 8px rgba(255,255,255,0.5),
0 0 20px rgba(120,180,255,0.6);
}

50%{
box-shadow:
0 0 25px rgba(255,255,255,1),
0 0 50px rgba(120,180,255,1);
}

100%{
box-shadow:
0 0 8px rgba(255,255,255,0.5),
0 0 20px rgba(120,180,255,0.6);
}

}

/* sao */

.star{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

animation:twinkle 2s infinite alternate;

z-index:1;

}

@keyframes twinkle{

from{opacity:0.2}
to{opacity:1}

}

</style>
</head>

<body>

<img src="cover.png" class="cover">

<button class="open-btn" onclick="openCard()">OPEN</button>

<script>

function openCard(){
window.location.href="card.html"
}

/* tạo sao */

for(let i=0;i<80;i++){

let star=document.createElement("div")

star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

star.style.animationDuration=(Math.random()*3+1)+"s"

document.body.appendChild(star)

}

</script>

</body>
</html>
